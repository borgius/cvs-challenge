name: deploy-readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-build-and-terraform:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        working-directory: infra/terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Deployment note
        run: echo "The supported deployment path currently lives in scripts/deploy.sh and related Bash scripts. Terraform remains validation-only scaffolding for now."
