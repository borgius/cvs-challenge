name: deploy-readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-build-and-opentofu:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_wrapper: false

      - name: OpenTofu format check
        working-directory: infra
        run: tofu fmt -check -recursive

      - name: OpenTofu init (backend bootstrap root)
        working-directory: infra/bootstrap/tofu-backend
        run: tofu init -backend=false -input=false

      - name: OpenTofu validate (backend bootstrap root)
        working-directory: infra/bootstrap/tofu-backend
        run: tofu validate -no-color

      - name: OpenTofu init (application stack)
        working-directory: infra/terraform
        run: tofu init -backend=false -input=false

      - name: OpenTofu validate (application stack)
        working-directory: infra/terraform
        run: tofu validate -no-color

      - name: Deployment note
        run: echo "scripts/bootstrap-tofu-backend.sh bootstraps the remote state bucket and lock table, and scripts/deploy.sh packages the Lambda artifact and runs tofu init/apply. This workflow validates both OpenTofu roots without applying them."
